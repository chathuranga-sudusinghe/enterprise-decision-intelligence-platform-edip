apiVersion: 1

groups:
  - orgId: 1
    name: EDIP Alert Rules
    folder: EDIP
    interval: 1m
    rules:
      - uid: edip_api_down
        title: EDIP API Down
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: up{job="edip_api"} == 0
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: OK
        execErrState: Alerting
        for: 2m
        annotations:
          summary: EDIP API is down.
          description: Prometheus could not confirm the edip_api target is up for 2 minutes.
        labels:
          severity: critical
          service: edip-api

      - uid: edip_workflow_errors_high
        title: EDIP Workflow Errors Increasing
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: sum(increase(edip_workflow_run_errors_total[5m])) > 0
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: OK
        execErrState: Alerting
        for: 1m
        annotations:
          summary: EDIP workflow errors detected.
          description: One or more workflow errors were recorded in the last 5 minutes.
        labels:
          severity: warning
          service: edip-workflow