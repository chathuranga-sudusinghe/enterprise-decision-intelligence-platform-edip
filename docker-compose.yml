# docker-compose.yml

services:
  kafka: # Kafka broker
    image: apache/kafka:4.2.0
    container_name: edip-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENERS: "INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:29092,EXTERNAL://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9092'"]
      interval: 10s
      timeout: 5s
      retries: 12

  kafka-topic-init: # Service to initialize Kafka topics
    image: python:3.12-slim
    container_name: edip-kafka-topic-init
    depends_on:
      kafka:
        condition: service_healthy
    working_dir: /app
    environment:
      PYTHONPATH: /app
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_ADMIN_CLIENT_ID: edip-kafka-topic-init
    volumes:
      - ./:/app
    command: >
      sh -c "pip install --no-cache-dir kafka-python &&
             python scripts/init_kafka_topics.py"
    restart: "no"

  api: # FastAPI application
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edip-api
    depends_on:
      kafka:
        condition: service_healthy
      kafka-topic-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    volumes:
      - ./:/app
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
  
  prometheus: # Prometheus metrics collector
    image: prom/prometheus:latest
    container_name: edip-prometheus
    depends_on:
      - api
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  grafana: # Grafana dashboard
    image: grafana/grafana:latest
    container_name: edip-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/alerting:/etc/grafana/provisioning/alerting:ro
    restart: unless-stopped

  postgres: # PostgreSQL for Airflow metadata
    image: postgres:16
    container_name: edip-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 10
    
  airflow-init: # Initialize Airflow metadata DB and admin user
    image: apache/airflow:3.1.0
    container_name: edip-airflow-init
    working_dir: /app
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__DAGS_FOLDER: /app/pipelines/airflow_dags
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    volumes:
      - ./:/app
      - airflow_data:/opt/airflow
    command: >
      bash -c "
      pip install --no-cache-dir pandas scikit-learn joblib pyyaml kafka-python &&
      airflow db migrate &&
      airflow users create
      --username admin
      --firstname EDIP
      --lastname Admin
      --role Admin
      --email admin@example.com
      --password admin || true
      "
    restart: "no"

  airflow-webserver: # Airflow UI
    image: apache/airflow:3.1.0
    container_name: edip-airflow-webserver
    working_dir: /app
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__DAGS_FOLDER: /app/pipelines/airflow_dags
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    volumes:
      - ./:/app
      - airflow_data:/opt/airflow
    command: >
      bash -c "
      pip install --no-cache-dir pandas scikit-learn joblib pyyaml kafka-python &&
      airflow api-server --port 8080
      "

  airflow-scheduler: # Airflow scheduler
    image: apache/airflow:3.1.0
    container_name: edip-airflow-scheduler
    working_dir: /app
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__DAGS_FOLDER: /app/pipelines/airflow_dags
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    volumes:
      - ./:/app
      - airflow_data:/opt/airflow
    command: >
      bash -c "
      pip install --no-cache-dir pandas scikit-learn joblib pyyaml kafka-python &&
      airflow scheduler
      "
  airflow-dag-processor: # Airflow DAG processor
    image: apache/airflow:3.1.0
    container_name: edip-airflow-dag-processor
    working_dir: /app
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__DAGS_FOLDER: /app/pipelines/airflow_dags
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    volumes:
      - ./:/app
      - airflow_data:/opt/airflow
    command: >
      bash -c "
      pip install --no-cache-dir pandas scikit-learn joblib pyyaml kafka-python &&
      airflow dag-processor
      "


volumes:
  kafka_data:
  postgres_data:
  airflow_data:
  prometheus_data:
  grafana_data: