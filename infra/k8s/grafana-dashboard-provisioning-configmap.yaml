apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provisioning-config
  namespace: edip
data:
  dashboard.yml: |
    apiVersion: 1

    providers:
      - name: "EDIP Dashboards"
        orgId: 1
        folder: "EDIP"
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards